<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bodhitropolis</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #14121f;
        overflow: hidden;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }

      /* Opening challenge overlay: dark panel on the #14121f ground, meadow-gold
         accent (matches renderer PALETTE.meadow), monospace pixel feel. */
      .opening-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(20, 18, 31, 0.82);
        z-index: 10;
        font-family: "Courier New", ui-monospace, monospace;
        color: #e6e2d0;
      }
      .opening-panel {
        box-sizing: border-box;
        max-width: 46rem;
        max-height: 88vh;
        overflow-y: auto;
        margin: 1.5rem;
        padding: 1.75rem 2rem;
        background: #1c1a2a;
        border: 2px solid #969e4a;
        box-shadow: 0 0 0 4px #14121f, 0 12px 40px rgba(0, 0, 0, 0.5);
        line-height: 1.5;
      }
      .opening-name {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: #c8c264;
        text-shadow: 2px 2px 0 #14121f;
      }
      .opening-eras {
        margin: 0 0 1rem;
        padding: 0.75rem 0;
        border-top: 1px solid #3a3850;
        border-bottom: 1px solid #3a3850;
        font-size: 0.86rem;
        color: #b6b2c6;
      }
      .opening-eras p {
        margin: 0.2rem 0;
      }
      .opening-stats {
        margin: 0 0 1rem;
        color: #d6d2be;
      }
      .opening-stats p {
        margin: 0.25rem 0;
      }
      .opening-challenge p {
        margin: 0.6rem 0;
        color: #e6e2d0;
      }
      .opening-begin {
        margin-top: 1.25rem;
        padding: 0.6rem 1.6rem;
        font: inherit;
        font-size: 1rem;
        letter-spacing: 0.08em;
        color: #14121f;
        background: #c8c264;
        border: none;
        cursor: pointer;
      }
      .opening-begin:hover,
      .opening-begin:focus {
        background: #e0da82;
        outline: 2px solid #e6e2d0;
        outline-offset: 2px;
      }

      /* Tech panel: right-docked over the live map, toggled by T. Palette matches
         the opening overlay (#1c1a2a panel, #969e4a meadow border). Internal
         scroll keeps all seven branch columns reachable on short viewports. */
      .tech-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(440px, 92vw);
        z-index: 9;
        box-sizing: border-box;
        overflow-y: auto;
        padding: 1rem 1.25rem 2rem;
        background: #1c1a2a;
        border-left: 2px solid #969e4a;
        box-shadow: -8px 0 28px rgba(0, 0, 0, 0.5);
        font-family: "Courier New", ui-monospace, monospace;
        color: #e6e2d0;
      }
      .tech-panel[hidden] {
        display: none;
      }
      .tech-panel-header {
        position: sticky;
        top: 0;
        margin: -1rem -1.25rem 0.75rem;
        padding: 0.85rem 1.25rem;
        background: #1c1a2a;
        border-bottom: 1px solid #3a3850;
        font-size: 1.05rem;
        letter-spacing: 0.03em;
        color: #c8c264;
      }
      .tech-column {
        margin-bottom: 1rem;
      }
      .tech-column-title {
        margin: 0.5rem 0 0.35rem;
        font-size: 0.92rem;
        letter-spacing: 0.04em;
        color: #b6b2c6;
      }
      .tech-node {
        padding: 0.4rem 0.55rem;
        margin: 0.3rem 0;
        border: 1px solid #3a3850;
        border-radius: 2px;
      }
      .tech-node-name {
        font-size: 0.84rem;
      }
      .tech-node-flavor {
        margin-top: 0.18rem;
        font-size: 0.72rem;
        color: #8f8ba4;
      }
      .tech-node-missing {
        margin-top: 0.18rem;
        font-size: 0.7rem;
        color: #b98c7a;
      }
      .tech-node-locked {
        opacity: 0.55;
      }
      .tech-node-affordable {
        border-color: #c8c264;
        background: #221f33;
      }
      .tech-node-clickable {
        cursor: pointer;
      }
      .tech-node-clickable:hover {
        background: #2a2740;
      }
      .tech-node-unlocked {
        border-color: #6a8a4a;
        color: #cfe0b0;
      }

      /* Tool dock: always-on bottom bar over the live map. Palette matches the
         tech panel (#1c1a2a panel, #969e4a meadow border, #c8c264 selection).
         Sits below the tech panel (z 9) and the opening overlay (z 10). */
      .toolbar {
        position: fixed;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        z-index: 8;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        max-width: 96vw;
        padding: 0.5rem 0.75rem;
        background: rgba(28, 26, 42, 0.94);
        border: 2px solid #969e4a;
        border-bottom: none;
        box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.45);
        font-family: "Courier New", ui-monospace, monospace;
      }
      .toolbar-tools {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.4rem;
      }
      .toolbar-status {
        max-width: 100%;
        font-size: 0.74rem;
        letter-spacing: 0.02em;
        color: #b6b2c6;
        text-align: center;
      }
      .toolbar-status[hidden] {
        display: none;
      }
      .toolbar-tool {
        padding: 0.35rem 0.7rem;
        font: inherit;
        font-size: 0.8rem;
        letter-spacing: 0.02em;
        color: #e6e2d0;
        background: #221f33;
        border: 1px solid #3a3850;
        border-radius: 2px;
        cursor: pointer;
        white-space: nowrap;
      }
      .toolbar-tool:hover {
        background: #2a2740;
      }
      .toolbar-tool-selected {
        border-color: #c8c264;
        background: #2f2b46;
        color: #c8c264;
      }
      .toolbar-tool-unaffordable {
        opacity: 0.45;
      }

      /* Categorized dock (v2): top-level modes + category tiles in one row; the
         open category's tools in a flyout above. Pictorial icons + pixel labels. */
      .toolbar-main {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .toolbar-modes,
      .toolbar-cats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .toolbar-cats {
        padding-left: 0.5rem;
        border-left: 1px solid #3a3850;
      }
      .toolbar-flyout {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.35rem;
        max-width: 94vw;
        padding-bottom: 0.4rem;
        margin-bottom: 0.1rem;
        border-bottom: 1px solid #3a3850;
      }
      .toolbar-flyout[hidden] {
        display: none;
      }
      .toolbar-mode,
      .toolbar-cat,
      .toolbar-flyitem {
        padding: 0.35rem 0.7rem;
        font: inherit;
        font-size: 0.8rem;
        letter-spacing: 0.02em;
        color: #e6e2d0;
        background: #221f33;
        border: 1px solid #3a3850;
        border-radius: 2px;
        cursor: pointer;
        white-space: nowrap;
      }
      .toolbar-mode:hover,
      .toolbar-cat:hover,
      .toolbar-flyitem:hover {
        background: #2a2740;
      }
      .toolbar-cat {
        font-size: 0.82rem;
      }
      .toolbar-mode-selected,
      .toolbar-cat-active,
      .toolbar-flyitem-selected {
        border-color: #c8c264;
        background: #2f2b46;
        color: #c8c264;
      }
      /* A category that holds the selected tool but is closed: a quiet gold hint. */
      .toolbar-cat-hassel {
        border-color: #8a8550;
      }
      .toolbar-flyitem-unaffordable {
        opacity: 0.45;
      }

      /* Dock meta row: [Tech (T)] [Eco (E)] [Civic (C)] — the keyboard-only depth
         surfaced as always-visible toggles, sitting in the dock below the tool row.
         Read as secondary controls (smaller, muted) until active, when they take the
         meadow-gold selection palette shared with .toolbar-tool-selected. */
      .toolbar-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.4rem;
      }
      .toolbar-meta-button {
        padding: 0.28rem 0.6rem;
        font: inherit;
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        color: #b6b2c6;
        background: #1f1d2e;
        border: 1px solid #3a3850;
        border-radius: 2px;
        cursor: pointer;
        white-space: nowrap;
      }
      .toolbar-meta-button:hover {
        background: #2a2740;
      }
      .toolbar-meta-active {
        border-color: #c8c264;
        background: #2f2b46;
        color: #c8c264;
      }

      /* Unlock flash: a ~1s meadow-gold pulse on the whole dock when the tech tree
         grants a new tool (added once by the shell, removed after the timeout). */
      @keyframes toolbar-flash {
        0% {
          border-color: #969e4a;
          box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.45);
        }
        30% {
          border-color: #e0da82;
          box-shadow: 0 0 20px 4px rgba(200, 194, 100, 0.85);
        }
        100% {
          border-color: #969e4a;
          box-shadow: 0 -6px 24px rgba(0, 0, 0, 0.45);
        }
      }
      .toolbar-tool-flash {
        animation: toolbar-flash 1s ease-out;
      }

      /* Wellbeing pulse: a thin always-on readout, top-center over the live map.
         Its own dedicated dock (never the toolbar status), refreshed on the civic
         cadence so it never flickers. Palette matches the docks. */
      .pulse-dock {
        position: fixed;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        z-index: 8;
        padding: 0.35rem 0.9rem;
        background: rgba(28, 26, 42, 0.94);
        border: 2px solid #969e4a;
        border-top: none;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        font-family: "Courier New", ui-monospace, monospace;
        font-size: 0.82rem;
        letter-spacing: 0.03em;
        color: #d8d4c2;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
